<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduMémos</title>
    <link rel="manifest" href="./manifest.json" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main class="container">
      <header class="header">
        <h1>Le Flux d'Entraide de la Promo</h1>
        <p>Conservez vos pensées et vos idées avec style</p>
      </header>

      <section class="controls" aria-label="Recherche et filtres">
        <div class="controls-container">
          <input
            type="text"
            id="searchInput"
            placeholder="Rechercher une aide ou un sujet..."
            class="search-input"
          />
          <div class="filter-group">
            <select id="filterSelect" class="filter-select">
              <option value="all">Tous les mémos</option>
              <option value="entraideProgrammation">
                Entraide Programmation
              </option>
              <option value="ressources">Ressources</option>
              <option value="infosPromo">Infos Promo</option>
              <option value="flashcards">Flashcards</option>
            </select>
            <button type="button" id="addNoteBtn" class="add-btn">
              <i class="fas fa-plus"></i> Partager
            </button>
          </div>
        </div>
      </section>

      <section
        id="notesContainer"
        class="notes-grid"
        aria-label="Liste des mémos"
      >
        <!-- Des notes seront ajoutées ici de manière dynamique -->
      </section>

      <section id="emptyState" class="empty-state">
        <i class="fas fa-notes-medical"></i>
        <h3>Aucune note</h3>
        <p>
          Ajoutez votre première note en cliquant sur le bouton « Partager »
        </p>
      </section>

      <div id="addNoteModal" class="modal-overlay">
        <div class="modal">
          <div class="modal-header">
            <h3 class="modal-title">Nouveau mémo</h3>
            <button type="button" id="closeModalBtn" class="modal-close">
              <i class="fas fa-times"></i>
            </button>
          </div>

          <form id="noteForm" class="modal-body">
            <div class="form-group">
              <label for="noteTitle" class="form-label">Sujet du mémo</label>
              <input type="text" id="noteTitle" class="form-input" required />
            </div>
            <div class="form-group">
              <label for="noteContent" class="form-label">
                Votre message / Description / Liens utiles
              </label>
              <textarea
                id="noteContent"
                class="form-input form-textarea"
                required
              ></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Tags</label>
              <div class="tags-container">
                <!-- Pour les blocages techniques -->
                <label class="tag-option">
                  <input
                    type="radio"
                    name="noteTag"
                    value="entraideProgrammation"
                    class="tag-radio"
                  />
                  <span class="tag-label tag-entraideProgrammation">
                    <i class="fas fa-briefcase"></i> Entraide Programmation
                  </span>
                </label>
                <!-- Pour partager des liens vers des documentations, des vidéos, des outils -->
                <label class="tag-option">
                  <input
                    type="radio"
                    name="noteTag"
                    value="ressources"
                    class="tag-radio"
                  />
                  <span class="tag-label tag-ressources">
                    <i class="fas fa-user"></i> Ressources
                  </span>
                </label>
                <!-- Pour les changements de salles, les dates de rendus de projets, les rappels -->
                <label class="tag-option">
                  <input
                    type="radio"
                    name="noteTag"
                    value="infosPromo"
                    class="tag-radio"
                    checked
                  />
                  <span class="tag-label tag-infosPromo">
                    <i class="fas fa-lightbulb"></i> Infos Promo
                  </span>
                </label>
                <!-- Pour partager des fiches de révisions rapides avant un examen -->
                <label class="tag-option">
                  <input
                    type="radio"
                    name="noteTag"
                    value="flashcards"
                    class="tag-radio"
                  />
                  <span class="tag-label tag-flashcards">
                    <i class="fas fa-bell"></i> Flashcards
                  </span>
                </label>
              </div>
            </div>
            <button type="submit" class="submit-btn">
              Enregistrer le mémo
            </button>
          </form>
        </div>
      </div>

      <div id="confirmModal" class="modal-overlay">
        <div class="modal confirmation-modal">
          <div class="modal-body">
            <p class="confirmation-text">
              Êtes-vous sûr de vouloir supprimer ce mémo?
            </p>
            <div class="confirmation-buttons">
              <button
                type="button"
                id="cancelDeleteBtn"
                class="confirmation-btn cancel-btn"
              >
                Annuler
              </button>
              <button
                type="button"
                id="confirmDeleteBtn"
                class="confirmation-btn confirm-btn"
              >
                Effacer
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="./index.js"></script>
  </body>
</html>
